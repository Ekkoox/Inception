services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    env_file: .env
    volumes:
      - /Users/schneider/Projet_Code/Inception/data/mariadb:/var/lib/mysql
    networks:
      - inception
    restart: always

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    depends_on:
      - mariadb
    env_file: .env
    volumes:
      - /Users/schneider/Projet_Code/Inception/data/wordpress:/var/www/wordpress
    networks:
      - inception
    restart: always

  nginx:
    build: ./requirements/nginx
    container_name: nginx
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - /Users/schneider/Projet_Code/Inception/data/wordpress:/var/www/wordpress
    networks:
      - inception
    restart: always

networks:
  inception:
    driver: bridge